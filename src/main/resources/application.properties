spring.application.name=AOSPI

# Server settings
server.address=0.0.0.0
server.port=8080
spring.thymeleaf.encoding=UTF-8

# DB settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.datasource.url=jdbc:mysql://mysql-8.4.local:3306/PNEUMOTRAINING?characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=
hibernate.validator.apply_to_ddl=true

# Resources settings
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
spring.devtools.restart.additional-paths=src/main/resources/templates,src/main/resources/static

# Logging settings
logging.level.root=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
