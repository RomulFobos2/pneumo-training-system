<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="${materialDTO.title + ' | АОС ПИ'}">Материал | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="row justify-content-center">
                <div class="col-12 col-lg-10">
                    <div class="profile-card p-4">
                        <h1 class="page-title" th:text="${materialDTO.title}"></h1>
                        <p class="page-subtitle">
                            <span class="badge bg-secondary" th:text="${materialDTO.materialTypeDisplayName}"></span>
                        </p>

                        <!-- TEXT -->
                        <div th:if="${materialDTO.materialTypeName == 'TEXT'}" class="material-content mt-3">
                            <div th:utext="${materialDTO.content}"></div>
                        </div>

                        <!-- PDF -->
                        <div th:if="${materialDTO.materialTypeName == 'PDF'}" class="mt-3">
                            <iframe th:src="${materialDTO.content}" width="100%" height="800"
                                    style="border: 1px solid var(--border); border-radius: 8px;"></iframe>
                            <div class="mt-2">
                                <a th:href="${materialDTO.content}" target="_blank" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-box-arrow-up-right"></i> Открыть в новой вкладке
                                </a>
                            </div>
                        </div>

                        <!-- VIDEO_LINK -->
                        <div th:if="${materialDTO.materialTypeName == 'VIDEO_LINK'}" class="mt-3">
                            <div class="ratio ratio-16x9">
                                <iframe id="videoFrame" allowfullscreen
                                        style="border: 1px solid var(--border); border-radius: 8px;"></iframe>
                            </div>
                            <div class="mt-2">
                                <a th:href="${materialDTO.content}" target="_blank" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-box-arrow-up-right"></i> Открыть на YouTube
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="link-section mt-3">
                        <a th:href="@{/employee/specialist/theory/viewSection/{id}(id=${materialDTO.sectionId})}">← К разделу</a>
                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>

<script th:if="${materialDTO.materialTypeName == 'VIDEO_LINK'}" th:inline="javascript">
    var videoUrl = [[${materialDTO.content}]];
    var embedUrl = '';
    var match = videoUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
    if (match) {
        embedUrl = 'https://www.youtube.com/embed/' + match[1];
    } else {
        embedUrl = videoUrl;
    }
    document.getElementById('videoFrame').src = embedUrl;
</script>
</body>
</html>
