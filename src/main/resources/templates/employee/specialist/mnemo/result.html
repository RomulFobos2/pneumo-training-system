<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Результат симуляции | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="row justify-content-center">
                <div class="col-12 col-lg-9">

                    <div class="profile-card p-4 mb-4">
                        <h1 class="page-title mb-3" th:text="${session.scenarioTitle}"></h1>

                        <!-- Status -->
                        <div class="text-center mb-4">
                            <div th:if="${session.sessionStatus == 'COMPLETED'}">
                                <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
                                <h4 class="text-success mt-2">Симуляция пройдена успешно</h4>
                            </div>
                            <div th:if="${session.sessionStatus == 'EXPIRED'}">
                                <i class="bi bi-clock-fill text-warning" style="font-size: 3rem;"></i>
                                <h4 class="text-warning mt-2">Время истекло</h4>
                            </div>
                            <div th:if="${session.sessionStatus == 'FAILED'}">
                                <i class="bi bi-x-circle-fill text-danger" style="font-size: 3rem;"></i>
                                <h4 class="text-danger mt-2">Симуляция не пройдена</h4>
                            </div>
                        </div>

                        <!-- Metrics -->
                        <div class="row g-3 mb-4">
                            <div class="col-md-3">
                                <div class="border rounded p-3 text-center">
                                    <div class="text-muted" style="font-size:0.8rem;">Статус</div>
                                    <span class="badge mt-1"
                                          th:classappend="${session.sessionStatus == 'COMPLETED' ? 'bg-success' : (session.sessionStatus == 'EXPIRED' ? 'bg-warning text-dark' : 'bg-danger')}"
                                          th:text="${session.sessionStatusDisplayName}"></span>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="border rounded p-3 text-center">
                                    <div class="text-muted" style="font-size:0.8rem;">Пройдено шагов</div>
                                    <div class="fw-bold fs-5">
                                        <span th:text="${session.completedSteps}"></span> / <span th:text="${session.totalSteps}"></span>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="border rounded p-3 text-center">
                                    <div class="text-muted" style="font-size:0.8rem;">Начало</div>
                                    <div style="font-size:0.9rem;" th:text="${#temporals.format(session.startedAt, 'dd.MM.yyyy HH:mm')}"></div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="border rounded p-3 text-center">
                                    <div class="text-muted" style="font-size:0.8rem;">Завершение</div>
                                    <div style="font-size:0.9rem;"
                                         th:text="${session.finishedAt != null ? #temporals.format(session.finishedAt, 'dd.MM.yyyy HH:mm') : '—'}"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Progress bar -->
                        <div class="mb-4">
                            <div class="d-flex justify-content-between mb-1">
                                <small class="text-muted">Прогресс</small>
                                <small class="text-muted"
                                       th:text="${session.totalSteps > 0 ? (session.completedSteps * 100 / session.totalSteps) + '%' : '0%'}"></small>
                            </div>
                            <div class="progress" style="height: 10px;">
                                <div class="progress-bar"
                                     th:classappend="${session.sessionStatus == 'COMPLETED' ? 'bg-success' : 'bg-warning'}"
                                     role="progressbar"
                                     th:style="'width: ' + (session.totalSteps > 0 ? (session.completedSteps * 100 / session.totalSteps) : 0) + '%'"></div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 justify-content-center">
                            <a href="/employee/specialist/mnemo/scenarios" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> К списку сценариев
                            </a>
                        </div>
                    </div>

                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
