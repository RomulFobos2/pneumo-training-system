<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Сценарии симуляции | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4">
                <h1 class="page-title">Симуляция мнемосхемы</h1>
                <p class="text-muted">Выберите назначенный сценарий или запустите доступный вариант.</p>
            </div>

            <div class="profile-card p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                    <h5 class="mb-0"><i class="bi bi-clipboard-check"></i> Мои назначения</h5>
                    <span class="badge bg-primary" th:text="${#lists.size(myAssignments)} + ' шт.'"></span>
                </div>
                <form method="get" th:action="@{/employee/specialist/mnemo/scenarios}" class="mb-3">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label">Поиск</label>
                            <input type="text" name="q" class="form-control form-control-sm"
                                   placeholder="Название или описание" th:value="${q}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Статус</label>
                            <select name="status" class="form-select form-select-sm">
                                <option value="ALL" th:selected="${status == null or status == 'ALL'}">Все</option>
                                <option value="PENDING" th:selected="${status == 'PENDING'}">Ожидает</option>
                                <option value="FAILED" th:selected="${status == 'FAILED'}">Не сдан</option>
                                <option value="OVERDUE" th:selected="${status == 'OVERDUE'}">Просрочен</option>
                                <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">Выполнен</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Дедлайн с</label>
                            <input type="date" name="deadlineFrom" class="form-control form-control-sm" th:value="${deadlineFrom}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Дедлайн по</label>
                            <input type="date" name="deadlineTo" class="form-control form-control-sm" th:value="${deadlineTo}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Создано с</label>
                            <input type="date" name="createdFrom" class="form-control form-control-sm" th:value="${createdFrom}">
                        </div>
                        <div class="col-md-1">
                            <label class="form-label">Создано по</label>
                            <input type="date" name="createdTo" class="form-control form-control-sm" th:value="${createdTo}">
                        </div>
                        <div class="col-12 d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <input type="hidden" name="hideCompleted" value="false">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="hideCompleted" name="hideCompleted" value="true"
                                       th:checked="${hideCompleted}">
                                <label class="form-check-label" for="hideCompleted">Скрыть пройденные</label>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="bi bi-funnel"></i> Применить
                                </button>
                                <a th:href="@{/employee/specialist/mnemo/scenarios}" class="btn btn-outline-secondary btn-sm">
                                    Сбросить
                                </a>
                            </div>
                        </div>
                    </div>
                </form>

                <div class="row g-3" th:if="${!#lists.isEmpty(myAssignments)}">
                    <div class="col-12 col-md-6 col-lg-4" th:each="as : ${myAssignments}">
                        <div class="profile-card p-4 h-100 d-flex flex-column border-start border-3"
                             th:classappend="${as.statusName == 'COMPLETED' ? 'border-success' : (as.statusName == 'FAILED' ? 'border-danger' : (as.statusName == 'OVERDUE' ? 'border-danger' : (as.daysUntilDeadline > 5 ? 'border-success' : (as.daysUntilDeadline >= 1 ? 'border-warning' : 'border-danger'))))}">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="mb-0" th:text="${as.scenarioTitle}"></h5>
                                <span class="badge"
                                      th:classappend="${as.statusName == 'COMPLETED' ? 'bg-success' : (as.statusName == 'FAILED' ? 'bg-danger' : (as.statusName == 'OVERDUE' ? 'bg-danger' : (as.daysUntilDeadline > 5 ? 'bg-success' : (as.daysUntilDeadline >= 1 ? 'bg-warning text-dark' : 'bg-danger'))))}"
                                      th:text="${as.statusDisplayName}"></span>
                            </div>
                            <p class="text-muted small flex-grow-1"
                               th:if="${as.scenarioDescription}"
                               th:text="${#strings.length(as.scenarioDescription) > 120 ? #strings.substring(as.scenarioDescription, 0, 120) + '...' : as.scenarioDescription}"></p>
                            <div class="mb-2">
                                <div class="text-muted small">
                                    <i class="bi bi-calendar-event"></i> Дедлайн:
                                    <span th:text="${#temporals.format(as.deadline, 'dd.MM.yyyy')}"></span>
                                </div>
                                <div class="text-muted small">
                                    <i class="bi bi-calendar-plus"></i> Назначено:
                                    <span th:text="${#temporals.format(as.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                                </div>
                            </div>
                            <a th:if="${as.statusName == 'PENDING'}"
                               th:href="@{/employee/specialist/mnemo/start/{id}(id=${as.scenarioId})}"
                               class="btn btn-primary btn-sm mt-auto">
                                <i class="bi bi-play-fill"></i> Начать
                            </a>
                            <a th:if="${as.statusName == 'COMPLETED' and as.completedSimulationSessionId != null}"
                               th:href="@{/employee/specialist/results/detailsSimResult/{id}(id=${as.completedSimulationSessionId})}"
                               class="btn btn-outline-success btn-sm mt-auto">
                                <i class="bi bi-eye"></i> Результат
                            </a>
                            <a th:if="${as.statusName == 'FAILED' and as.completedSimulationSessionId != null}"
                               th:href="@{/employee/specialist/results/detailsSimResult/{id}(id=${as.completedSimulationSessionId})}"
                               class="btn btn-outline-danger btn-sm mt-auto">
                                <i class="bi bi-eye"></i> Разбор
                            </a>
                            <span th:if="${as.statusName == 'OVERDUE'}" class="text-danger small mt-auto">
                                <i class="bi bi-exclamation-circle"></i> Срок выполнения истёк
                            </span>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(myAssignments)}" class="text-center text-muted py-3">
                    Назначения не найдены
                </div>
            </div>

            <h5 class="mb-3"><i class="bi bi-play-circle"></i> Сценарии без назначения</h5>

            <div th:if="${#lists.isEmpty(scenarios)}" class="profile-card p-4 text-center text-muted">
                Сценариев без назначения сейчас нет
            </div>

            <div class="row g-3">
                <div th:each="s : ${scenarios}" class="col-12 col-md-6 col-lg-4">
                    <div class="profile-card p-4 h-100 d-flex flex-column">
                        <h5 class="mb-2" th:text="${s.title}"></h5>
                        <p class="text-muted flex-grow-1" style="font-size: 0.9rem;"
                           th:if="${s.description != null}"
                           th:text="${s.description.length() > 120 ? s.description.substring(0, 120) + '...' : s.description}"></p>

                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <span class="badge bg-primary">
                                <i class="bi bi-list-ol"></i>
                                <span th:text="${s.stepCount + ' шагов'}"></span>
                            </span>
                            <span th:if="${s.timeLimit != null and s.timeLimit > 0}" class="badge bg-warning text-dark">
                                <i class="bi bi-clock"></i>
                                <span th:text="${s.timeLimit + ' мин'}"></span>
                            </span>
                            <span th:if="${s.timeLimit == null or s.timeLimit == 0}" class="badge bg-secondary">
                                <i class="bi bi-infinity"></i> Без ограничения
                            </span>
                            <span class="badge bg-info" th:text="${s.schemaTitle}"></span>
                        </div>

                        <a th:href="@{/employee/specialist/mnemo/start/{id}(id=${s.id})}"
                           class="btn btn-auth btn-sm mt-auto">
                            <i class="bi bi-play-fill"></i> Начать
                        </a>
                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
