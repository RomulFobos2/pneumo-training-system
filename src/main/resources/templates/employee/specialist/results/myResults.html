<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Мои результаты | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
    <script src="/js/tablePagination.js"></script>
    <script src="/js/tableSort.js"></script>
    <script src="/js/tableFilter.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4">
                <h1 class="page-title mb-0">Мои результаты</h1>
            </div>

            <!-- Tabs -->
            <ul class="nav nav-tabs mb-3" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="tests-tab" data-bs-toggle="tab"
                            data-bs-target="#testsPane" type="button" role="tab">Тесты</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="sim-tab" data-bs-toggle="tab"
                            data-bs-target="#simPane" type="button" role="tab">Симуляции</button>
                </li>
            </ul>

            <div class="tab-content">
            <!-- Tests tab -->
            <div class="tab-pane fade show active" id="testsPane" role="tabpanel">
            <div class="profile-card p-4">
                <div class="mb-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="hideNoAssignment">
                        <label class="form-check-label" for="hideNoAssignment">Скрыть результаты без назначения</label>
                    </div>
                </div>
                <table id="myTestsTable" class="table table-modern">
                    <thead>
                    <tr>
                        <th style="width: 50px">#</th>
                        <th data-sortable data-sort-type="text">Тест</th>
                        <th style="width: 90px">Тип</th>
                        <th style="width: 140px" data-sortable data-sort-type="date">Дата</th>
                        <th style="width: 100px">Баллы</th>
                        <th style="width: 80px" data-sortable data-sort-type="percent">%</th>
                        <th style="width: 120px">Статус</th>
                        <th style="width: 120px">Результат</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s, index : ${sessions}" th:data-has-assignment="${s.hasAssignment}">
                        <td class="row-number" th:text="${index.index + 1}"></td>
                        <td>
                            <a th:href="@{/employee/specialist/results/detailsResult/{id}(id=${s.id})}"
                               th:text="${s.testTitle}"></a>
                        </td>
                        <td>
                            <span th:if="${s.testIsExam}" class="badge bg-warning text-dark">Экзамен</span>
                            <span th:if="${!s.testIsExam}" class="text-muted">Тест</span>
                        </td>
                        <td th:text="${#temporals.format(s.startedAt, 'dd.MM.yyyy HH:mm')}"></td>
                        <td th:text="${s.score + ' / ' + s.totalScore}"></td>
                        <td th:text="${#numbers.formatDecimal(s.scorePercent, 1, 1) + '%'}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${s.sessionStatusName == 'COMPLETED' ? 'bg-success' : 'bg-secondary'}"
                                  th:text="${s.sessionStatusDisplayName}"></span>
                        </td>
                        <td>
                            <span th:if="${s.isPassed}" class="badge bg-success">Пройден</span>
                            <span th:if="${!s.isPassed}" class="badge bg-danger">Не пройден</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(sessions)}">
                        <td colspan="8" class="text-center text-muted">У вас пока нет результатов</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            </div>

            <!-- Simulations tab -->
            <div class="tab-pane fade" id="simPane" role="tabpanel">
            <div class="profile-card p-4">
                <div class="mb-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="hideNoAssignmentSim">
                        <label class="form-check-label" for="hideNoAssignmentSim">Скрыть результаты без назначения</label>
                    </div>
                </div>
                <table id="mySimTable" class="table table-modern">
                    <thead>
                    <tr>
                        <th style="width: 50px">#</th>
                        <th data-sortable data-sort-type="text">Сценарий</th>
                        <th style="width: 140px" data-sortable data-sort-type="date">Дата</th>
                        <th style="width: 120px">Шагов</th>
                        <th style="width: 120px">Статус</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s, index : ${simSessions}" th:data-has-assignment="${s.hasAssignment}">
                        <td class="row-number" th:text="${index.index + 1}"></td>
                        <td>
                            <a th:href="@{/employee/specialist/results/detailsSimResult/{id}(id=${s.id})}"
                               th:text="${s.scenarioTitle}"></a>
                        </td>
                        <td th:text="${#temporals.format(s.startedAt, 'dd.MM.yyyy HH:mm')}"></td>
                        <td th:text="${s.completedSteps + ' / ' + s.totalSteps}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${s.sessionStatus == 'COMPLETED' ? 'bg-success' : (s.sessionStatus == 'EXPIRED' ? 'bg-warning text-dark' : (s.sessionStatus == 'IN_PROGRESS' ? 'bg-info' : 'bg-danger'))}"
                                  th:text="${s.sessionStatusDisplayName}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(simSessions)}">
                        <td colspan="5" class="text-center text-muted">У вас пока нет результатов симуляций</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
<script>
    // Фильтр + поиск + пагинация для таблицы тестов
    var testsFilter = initTableFilter('myTestsTable', {
        searchPlaceholder: 'Поиск по названию теста...',
        filters: [
            { column: 2, label: 'Тип', options: [
                { value: 'Экзамен', text: 'Экзамен' },
                { value: 'Тест', text: 'Тест' }
            ]},
            { column: 7, label: 'Результат', options: [
                { value: 'Пройден', text: 'Пройден' },
                { value: 'Не пройден', text: 'Не пройден' }
            ]}
        ],
        perPage: 20
    });
    initSortable('myTestsTable');

    // Фильтр + поиск + пагинация для таблицы симуляций
    var simFilter = initTableFilter('mySimTable', {
        searchPlaceholder: 'Поиск по названию сценария...',
        filters: [
            { column: 4, label: 'Статус', options: [
                { value: 'Завершён', text: 'Завершён' },
                { value: 'Время истекло', text: 'Время истекло' },
                { value: 'Провален', text: 'Провален' }
            ]}
        ],
        perPage: 20
    });
    initSortable('mySimTable');

    // Refresh при переключении на вкладку (Bootstrap tab скрывает контент)
    document.getElementById('sim-tab').addEventListener('shown.bs.tab', function() {
        if (simFilter) simFilter.refresh();
    });
    document.getElementById('tests-tab').addEventListener('shown.bs.tab', function() {
        if (testsFilter) testsFilter.refresh();
    });

    // Скрытие результатов без назначения — тесты
    (function() {
        var checkbox = document.getElementById('hideNoAssignment');
        if (!checkbox || !testsFilter) return;

        testsFilter.addCustomFilter(function(row) {
            if (!checkbox.checked) return true;
            var attr = row.getAttribute('data-has-assignment');
            return attr !== 'false';
        });

        checkbox.addEventListener('change', function() {
            testsFilter.refresh();
        });
    })();

    // Скрытие результатов без назначения — симуляции
    (function() {
        var checkbox = document.getElementById('hideNoAssignmentSim');
        if (!checkbox || !simFilter) return;

        simFilter.addCustomFilter(function(row) {
            if (!checkbox.checked) return true;
            var attr = row.getAttribute('data-has-assignment');
            return attr !== 'false';
        });

        checkbox.addEventListener('change', function() {
            simFilter.refresh();
        });
    })();
</script>
</body>
</html>
