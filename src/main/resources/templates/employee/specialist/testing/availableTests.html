<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Тестирование | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4">
                <h1 class="page-title mb-0">Доступные тесты</h1>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="row g-3">
                <div class="col-12 col-md-6 col-lg-4" th:each="test : ${availableTests}">
                    <div class="profile-card p-4 h-100 d-flex flex-column">
                        <h5 th:text="${test.title}"></h5>
                        <p class="text-muted small flex-grow-1"
                           th:if="${test.description}"
                           th:text="${#strings.length(test.description) > 120
                               ? #strings.substring(test.description, 0, 120) + '...'
                               : test.description}"></p>
                        <div class="mb-3">
                            <span class="badge bg-light text-dark me-1">
                                <i class="bi bi-question-circle"></i>
                                <span th:text="${test.questionCount}"></span> вопросов
                            </span>
                            <span class="badge bg-light text-dark me-1" th:if="${test.timeLimit > 0}">
                                <i class="bi bi-clock"></i>
                                <span th:text="${test.timeLimit}"></span> мин
                            </span>
                            <span class="badge bg-light text-dark me-1" th:if="${test.timeLimit == 0}">
                                <i class="bi bi-clock"></i> без ограничения
                            </span>
                            <span class="badge bg-light text-dark">
                                <i class="bi bi-check-circle"></i>
                                <span th:text="${test.passingScore}"></span>%
                            </span>
                        </div>
                        <div class="mb-2" th:if="${test.isExam()}">
                            <span class="badge bg-warning text-dark">Экзамен</span>
                        </div>
                        <a th:href="@{/employee/specialist/testing/startTest/{id}(id=${test.id})}"
                           class="btn btn-primary btn-sm mt-auto">
                            <i class="bi bi-play-fill"></i> Начать
                        </a>
                    </div>
                </div>
                <div class="col-12" th:if="${#lists.isEmpty(availableTests)}">
                    <div class="profile-card p-4 text-center text-muted">
                        Нет доступных тестов
                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
