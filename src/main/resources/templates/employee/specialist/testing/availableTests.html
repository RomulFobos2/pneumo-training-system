<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Тестирование | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4">
                <h1 class="page-title mb-0">Тестирование</h1>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <!-- Назначенные тесты -->
            <div th:if="${!#lists.isEmpty(assignedTests)}" class="mb-4">
                <h5 class="mb-3"><i class="bi bi-clipboard-check"></i> Назначенные тесты</h5>
                <div class="row g-3">
                    <div class="col-12 col-md-6 col-lg-4" th:each="at : ${assignedTests}">
                        <div class="profile-card p-4 h-100 d-flex flex-column border-start border-3"
                             th:classappend="${at.daysUntilDeadline > 5 ? 'border-success' : (at.daysUntilDeadline >= 1 ? 'border-warning' : 'border-danger')}">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="mb-0" th:text="${at.testTitle}"></h5>
                                <span class="badge"
                                      th:classappend="${at.daysUntilDeadline > 5 ? 'bg-success' : (at.daysUntilDeadline >= 1 ? 'bg-warning text-dark' : 'bg-danger')}"
                                      th:text="${at.daysUntilDeadline > 0 ? 'Осталось ' + at.daysUntilDeadline + ' дн.' : (at.daysUntilDeadline == 0 ? 'Сегодня!' : 'Просрочено')}"></span>
                            </div>
                            <p class="text-muted small flex-grow-1"
                               th:if="${at.testDescription}"
                               th:text="${#strings.length(at.testDescription) > 120
                                   ? #strings.substring(at.testDescription, 0, 120) + '...'
                                   : at.testDescription}"></p>
                            <div class="mb-2">
                                <span class="badge bg-light text-dark me-1">
                                    <i class="bi bi-question-circle"></i>
                                    <span th:text="${at.questionCount}"></span> вопросов
                                </span>
                                <span class="badge bg-light text-dark me-1" th:if="${at.timeLimit > 0}">
                                    <i class="bi bi-clock"></i>
                                    <span th:text="${at.timeLimit}"></span> мин
                                </span>
                                <span class="badge bg-light text-dark me-1" th:if="${at.timeLimit == 0}">
                                    <i class="bi bi-clock"></i> без ограничения
                                </span>
                                <span class="badge bg-light text-dark">
                                    <i class="bi bi-check-circle"></i>
                                    <span th:text="${at.passingScore}"></span>%
                                </span>
                            </div>
                            <div class="mb-2">
                                <span class="text-muted small">
                                    <i class="bi bi-calendar-event"></i> Срок: <span th:text="${#temporals.format(at.deadline, 'dd.MM.yyyy')}"></span>
                                </span>
                                <span class="badge bg-warning text-dark ms-1" th:if="${at.exam}">Экзамен</span>
                            </div>
                            <a th:href="@{/employee/specialist/testing/startTest/{id}(id=${at.testId})}"
                               class="btn btn-primary btn-sm mt-auto">
                                <i class="bi bi-play-fill"></i> Начать
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Доступные тесты -->
            <h5 class="mb-3"><i class="bi bi-list-check"></i> Доступные тесты</h5>
            <div class="row g-3">
                <div class="col-12 col-md-6 col-lg-4" th:each="test : ${availableTests}">
                    <div class="profile-card p-4 h-100 d-flex flex-column">
                        <h5 th:text="${test.title}"></h5>
                        <p class="text-muted small flex-grow-1"
                           th:if="${test.description}"
                           th:text="${#strings.length(test.description) > 120
                               ? #strings.substring(test.description, 0, 120) + '...'
                               : test.description}"></p>
                        <div class="mb-3">
                            <span class="badge bg-light text-dark me-1">
                                <i class="bi bi-question-circle"></i>
                                <span th:text="${test.questionCount}"></span> вопросов
                            </span>
                            <span class="badge bg-light text-dark me-1" th:if="${test.timeLimit > 0}">
                                <i class="bi bi-clock"></i>
                                <span th:text="${test.timeLimit}"></span> мин
                            </span>
                            <span class="badge bg-light text-dark me-1" th:if="${test.timeLimit == 0}">
                                <i class="bi bi-clock"></i> без ограничения
                            </span>
                            <span class="badge bg-light text-dark">
                                <i class="bi bi-check-circle"></i>
                                <span th:text="${test.passingScore}"></span>%
                            </span>
                        </div>
                        <div class="mb-2" th:if="${test.isExam()}">
                            <span class="badge bg-warning text-dark">Экзамен</span>
                        </div>
                        <a th:href="@{/employee/specialist/testing/startTest/{id}(id=${test.id})}"
                           class="btn btn-primary btn-sm mt-auto">
                            <i class="bi bi-play-fill"></i> Начать
                        </a>
                    </div>
                </div>
                <div class="col-12" th:if="${#lists.isEmpty(availableTests)}">
                    <div class="profile-card p-4 text-center text-muted">
                        Нет доступных тестов
                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
