<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Тестирование | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4">
                <h1 class="page-title mb-0">Тестирование</h1>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="profile-card p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                    <h5 class="mb-0"><i class="bi bi-clipboard-check"></i> Мои назначения</h5>
                    <span class="badge bg-primary" th:text="${#lists.size(myAssignments)} + ' шт.'"></span>
                </div>
                <form method="get" th:action="@{/employee/specialist/testing/availableTests}" class="mb-3">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label">Поиск</label>
                            <input type="text" name="q" class="form-control form-control-sm"
                                   placeholder="Название или описание" th:value="${q}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Статус</label>
                            <select name="status" class="form-select form-select-sm">
                                <option value="ALL" th:selected="${status == null or status == 'ALL'}">Все</option>
                                <option value="PENDING" th:selected="${status == 'PENDING'}">Ожидает</option>
                                <option value="FAILED" th:selected="${status == 'FAILED'}">Не сдан</option>
                                <option value="OVERDUE" th:selected="${status == 'OVERDUE'}">Просрочен</option>
                                <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">Выполнен</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Дедлайн с</label>
                            <input type="date" name="deadlineFrom" class="form-control form-control-sm" th:value="${deadlineFrom}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Дедлайн по</label>
                            <input type="date" name="deadlineTo" class="form-control form-control-sm" th:value="${deadlineTo}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Создано с</label>
                            <input type="date" name="createdFrom" class="form-control form-control-sm" th:value="${createdFrom}">
                        </div>
                        <div class="col-md-1">
                            <label class="form-label">Создано по</label>
                            <input type="date" name="createdTo" class="form-control form-control-sm" th:value="${createdTo}">
                        </div>
                        <div class="col-12 d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <input type="hidden" name="hideCompleted" value="false">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="hideCompleted" name="hideCompleted" value="true"
                                       th:checked="${hideCompleted}">
                                <label class="form-check-label" for="hideCompleted">Скрыть пройденные</label>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="bi bi-funnel"></i> Применить
                                </button>
                                <a th:href="@{/employee/specialist/testing/availableTests}" class="btn btn-outline-secondary btn-sm">
                                    Сбросить
                                </a>
                            </div>
                        </div>
                    </div>
                </form>

                <div class="row g-3" th:if="${!#lists.isEmpty(myAssignments)}">
                    <div class="col-12 col-md-6 col-lg-4" th:each="at : ${myAssignments}">
                        <div class="profile-card p-4 h-100 d-flex flex-column border-start border-3"
                             th:classappend="${at.statusName == 'COMPLETED' ? 'border-success' : (at.statusName == 'FAILED' ? 'border-danger' : (at.statusName == 'OVERDUE' ? 'border-danger' : (at.daysUntilDeadline > 5 ? 'border-success' : (at.daysUntilDeadline >= 1 ? 'border-warning' : 'border-danger'))))}">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="mb-0" th:text="${at.testTitle}"></h5>
                                <span class="badge"
                                      th:classappend="${at.statusName == 'COMPLETED' ? 'bg-success' : (at.statusName == 'FAILED' ? 'bg-danger' : (at.statusName == 'OVERDUE' ? 'bg-danger' : (at.daysUntilDeadline > 5 ? 'bg-success' : (at.daysUntilDeadline >= 1 ? 'bg-warning text-dark' : 'bg-danger'))))}"
                                      th:text="${at.statusDisplayName}"></span>
                            </div>
                            <p class="text-muted small flex-grow-1"
                               th:if="${at.testDescription}"
                               th:text="${#strings.length(at.testDescription) > 120 ? #strings.substring(at.testDescription, 0, 120) + '...' : at.testDescription}"></p>
                            <div class="mb-2">
                                <span class="badge bg-light text-dark me-1">
                                    <i class="bi bi-question-circle"></i>
                                    <span th:text="${at.questionCount}"></span> вопросов
                                </span>
                                <span class="badge bg-light text-dark me-1">
                                    <i class="bi bi-clock"></i>
                                    <span th:text="${at.timeLimit > 0 ? at.timeLimit + ' мин' : 'без ограничения'}"></span>
                                </span>
                                <span class="badge bg-light text-dark">
                                    <i class="bi bi-check-circle"></i>
                                    <span th:text="${at.passingScore}"></span>%
                                </span>
                            </div>
                            <div class="mb-2">
                                <div class="text-muted small">
                                    <i class="bi bi-calendar-event"></i> Дедлайн:
                                    <span th:text="${#temporals.format(at.deadline, 'dd.MM.yyyy')}"></span>
                                </div>
                                <div class="text-muted small">
                                    <i class="bi bi-calendar-plus"></i> Назначено:
                                    <span th:text="${#temporals.format(at.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                                </div>
                            </div>
                            <a th:if="${at.statusName == 'PENDING'}"
                               th:href="@{/employee/specialist/testing/startTest/{id}(id=${at.testId})}"
                               class="btn btn-primary btn-sm mt-auto">
                                <i class="bi bi-play-fill"></i> Начать
                            </a>
                            <a th:if="${at.statusName == 'COMPLETED' and at.completedSessionId != null}"
                               th:href="@{/employee/specialist/results/detailsResult/{id}(id=${at.completedSessionId})}"
                               class="btn btn-outline-success btn-sm mt-auto">
                                <i class="bi bi-eye"></i> Результат
                            </a>
                            <a th:if="${at.statusName == 'FAILED' and at.completedSessionId != null}"
                               th:href="@{/employee/specialist/results/detailsResult/{id}(id=${at.completedSessionId})}"
                               class="btn btn-outline-danger btn-sm mt-auto">
                                <i class="bi bi-eye"></i> Разбор
                            </a>
                            <span th:if="${at.statusName == 'OVERDUE'}" class="text-danger small mt-auto">
                                <i class="bi bi-exclamation-circle"></i> Срок выполнения истёк
                            </span>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(myAssignments)}" class="text-center text-muted py-3">
                    Назначения не найдены
                </div>
            </div>

            <h5 class="mb-3"><i class="bi bi-list-check"></i> Тесты без назначения</h5>
            <div class="row g-3">
                <div class="col-12 col-md-6 col-lg-4" th:each="test : ${availableTests}">
                    <div class="profile-card p-4 h-100 d-flex flex-column">
                        <h5 th:text="${test.title}"></h5>
                        <p class="text-muted small flex-grow-1"
                           th:if="${test.description}"
                           th:text="${#strings.length(test.description) > 120 ? #strings.substring(test.description, 0, 120) + '...' : test.description}"></p>
                        <div class="mb-3">
                            <span class="badge bg-light text-dark me-1">
                                <i class="bi bi-question-circle"></i>
                                <span th:text="${test.questionCount}"></span> вопросов
                            </span>
                            <span class="badge bg-light text-dark me-1">
                                <i class="bi bi-clock"></i>
                                <span th:text="${test.timeLimit > 0 ? test.timeLimit + ' мин' : 'без ограничения'}"></span>
                            </span>
                            <span class="badge bg-light text-dark">
                                <i class="bi bi-check-circle"></i>
                                <span th:text="${test.passingScore}"></span>%
                            </span>
                        </div>
                        <a th:href="@{/employee/specialist/testing/startTest/{id}(id=${test.id})}"
                           class="btn btn-primary btn-sm mt-auto">
                            <i class="bi bi-play-fill"></i> Начать
                        </a>
                    </div>
                </div>
                <div class="col-12" th:if="${#lists.isEmpty(availableTests)}">
                    <div class="profile-card p-4 text-center text-muted">Тестов без назначения сейчас нет</div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
