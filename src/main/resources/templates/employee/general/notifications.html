<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Уведомления | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <h1 class="page-title mb-0">Уведомления</h1>
                    <div class="profile-actions" th:if="${!#lists.isEmpty(notifications)}">
                        <form method="post" th:action="@{/employee/notifications/markAllRead}" class="d-inline">
                            <button type="submit" class="btn btn-outline-primary btn-profile">
                                <i class="bi bi-check-all"></i> Отметить все как прочитанные
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(notifications)}" class="profile-card p-4 text-center text-muted">
                <i class="bi bi-bell-slash fs-1 d-block mb-2"></i>
                Нет уведомлений
            </div>

            <div th:each="n : ${notifications}" class="profile-card p-3 mb-2"
                 th:classappend="${!n.read} ? 'border-start border-primary border-3' : ''">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="flex-grow-1">
                        <div th:class="${!n.read} ? 'fw-bold' : ''">
                            <i class="bi bi-circle-fill text-primary me-1" th:if="${!n.read}" style="font-size: 0.5rem; vertical-align: middle;"></i>
                            <span th:text="${n.message}"></span>
                        </div>
                        <small class="text-muted"
                               th:text="${#temporals.format(n.createdAt, 'dd.MM.yyyy HH:mm')}"></small>
                    </div>
                    <div class="d-flex gap-1 ms-3 flex-shrink-0">
                        <a th:if="${n.link != null}" th:href="${n.link}" class="btn btn-sm btn-outline-primary" title="Перейти">
                            <i class="bi bi-box-arrow-up-right"></i>
                        </a>
                        <form th:if="${!n.read}" method="post"
                              th:action="@{/employee/notifications/markRead/{id}(id=${n.id})}" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-secondary" title="Прочитано">
                                <i class="bi bi-check-lg"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
