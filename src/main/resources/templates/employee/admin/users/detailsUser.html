<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Пользователь | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="row justify-content-center">
                <div class="col-12 col-lg-8">
                    <div class="profile-card p-4">

                        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-4">
                            <div>
                                <h1 class="page-title mb-1" th:text="${userDTO.fullName}"></h1>
                                <p class="page-subtitle mb-0" th:text="${userDTO.roleDescription}"></p>
                            </div>
                            <div>
                                <span th:if="${userDTO.active}" class="badge-active">Активен</span>
                                <span th:unless="${userDTO.active}" class="badge-inactive">Деактивирован</span>
                            </div>
                        </div>

                        <h6 class="form-section-title">Личные данные</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <div class="text-muted small">Фамилия</div>
                                <div th:text="${userDTO.lastName}"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small">Имя</div>
                                <div th:text="${userDTO.firstName}"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small">Отчество</div>
                                <div th:text="${userDTO.middleName} ?: '—'"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small">Дата рождения</div>
                                <div th:text="${userDTO.birthDate} ? ${#temporals.format(userDTO.birthDate, 'dd.MM.yyyy')} : '—'"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small">Подразделение</div>
                                <div th:text="${userDTO.departmentName} ?: '—'"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small">Должность</div>
                                <div th:text="${userDTO.position} ?: '—'"></div>
                            </div>
                        </div>

                        <h6 class="form-section-title">Данные входа</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="text-muted small">Логин</div>
                                <div th:text="${userDTO.username}"></div>
                            </div>
                            <div class="col-md-6">
                                <div class="text-muted small">Роль</div>
                                <div th:text="${userDTO.roleDescription}"></div>
                            </div>
                        </div>

                        <div class="profile-actions">
                            <a th:href="@{/employee/admin/users/editUser/{id}(id=${userDTO.id})}"
                               class="btn btn-primary btn-profile">
                                <i class="bi bi-pencil"></i> Редактировать
                            </a>
                            <a th:href="@{/employee/admin/users/resetPassword/{id}(id=${userDTO.id})}"
                               class="btn btn-warning btn-profile">
                                <i class="bi bi-key"></i> Сбросить пароль
                            </a>
                            <a th:if="${userDTO.active and canDeactivate}"
                               th:href="@{/employee/admin/users/deactivateUser/{id}(id=${userDTO.id})}"
                               class="btn btn-danger btn-profile"
                               onclick="return confirmDeactivate()">
                                <i class="bi bi-person-dash"></i> Деактивировать
                            </a>
                            <a th:if="${!userDTO.active}"
                               th:href="@{/employee/admin/users/activateUser/{id}(id=${userDTO.id})}"
                               class="btn btn-success btn-profile">
                                <i class="bi bi-person-check"></i> Активировать
                            </a>
                        </div>

                        <div class="link-section mt-3">
                            <a th:href="@{/employee/admin/users/allUsers}">← К списку пользователей</a>
                        </div>

                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
