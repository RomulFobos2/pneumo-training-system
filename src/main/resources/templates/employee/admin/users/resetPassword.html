<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Сброс пароля | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="row justify-content-center">
                <div class="col-12 col-lg-6">
                    <div class="profile-card p-4">

                        <h1 class="page-title">Сброс пароля</h1>
                        <p class="page-subtitle" th:text="'Пользователь: ' + ${userDTO.fullName}"></p>

                        <form th:action="@{/employee/admin/users/resetPassword/{id}(id=${userDTO.id})}" method="post" class="auth-form">

                            <div class="row g-3 mb-4">
                                <div class="col-12">
                                    <label class="form-label">Новый пароль *</label>
                                    <input type="password" id="inputPassword" name="inputPassword" class="form-control"
                                           required minlength="4" placeholder="Минимум 4 символа">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Подтверждение пароля *</label>
                                    <input type="password" id="inputPasswordConfirm" class="form-control"
                                           required placeholder="Повторите пароль">
                                    <div id="passwordFeedback" class="form-text"></div>
                                </div>
                            </div>

                            <button type="submit" id="submitBtn" class="btn btn-warning btn-profile" disabled>
                                <i class="bi bi-key"></i> Сбросить пароль
                            </button>
                        </form>

                        <div class="link-section mt-3">
                            <a th:href="@{/employee/admin/users/detailsUser/{id}(id=${userDTO.id})}">← К карточке пользователя</a>
                        </div>

                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>

<script>
    var passwordInput = document.getElementById('inputPassword');
    var passwordConfirmInput = document.getElementById('inputPasswordConfirm');
    var passwordFeedback = document.getElementById('passwordFeedback');
    var submitBtn = document.getElementById('submitBtn');

    function checkPasswords() {
        var pass = passwordInput.value;
        var confirm = passwordConfirmInput.value;
        if (confirm.length === 0) {
            passwordConfirmInput.classList.remove('is-valid', 'is-invalid');
            passwordFeedback.textContent = '';
            submitBtn.disabled = true;
        } else if (pass === confirm && pass.length >= 4) {
            passwordConfirmInput.classList.remove('is-invalid');
            passwordConfirmInput.classList.add('is-valid');
            passwordFeedback.textContent = 'Пароли совпадают';
            passwordFeedback.style.color = 'var(--success)';
            submitBtn.disabled = false;
        } else {
            passwordConfirmInput.classList.remove('is-valid');
            passwordConfirmInput.classList.add('is-invalid');
            passwordFeedback.textContent = pass !== confirm ? 'Пароли не совпадают' : 'Минимум 4 символа';
            passwordFeedback.style.color = 'var(--danger)';
            submitBtn.disabled = true;
        }
    }

    passwordInput.addEventListener('input', checkPasswords);
    passwordConfirmInput.addEventListener('input', checkPasswords);
</script>
</body>
</html>
