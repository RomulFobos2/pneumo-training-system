<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Разделы теории | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
    <script src="/js/tablePagination.js"></script>
    <script src="/js/tableFilter.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <h1 class="page-title mb-0">Разделы теории</h1>
                    <a th:href="@{/employee/chief/materials/addSection}" class="btn btn-success">
                        <i class="bi bi-plus-lg"></i> Добавить раздел
                    </a>
                </div>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

            <div class="profile-card p-4">
                <table class="table table-modern" id="sectionsTable">
                    <thead>
                    <tr>
                        <th style="width: 30px"></th>
                        <th style="width: 50px">#</th>
                        <th>Название</th>
                        <th>Описание</th>
                        <th style="width: 120px">Материалов</th>
                        <th style="width: 100px">Порядок</th>
                    </tr>
                    </thead>
                    <tbody id="sectionsBody">
                    <tr th:each="section, index : ${allSections}" th:data-id="${section.id}" draggable="true">
                        <td class="drag-handle"><i class="bi bi-grip-vertical"></i></td>
                        <td class="row-number" th:text="${index.index + 1}"></td>
                        <td>
                            <a th:href="@{/employee/chief/materials/detailsSection/{id}(id=${section.id})}"
                               th:text="${section.title}"></a>
                        </td>
                        <td>
                            <span th:if="${section.description != null and section.description.length() > 100}"
                                  th:text="${section.description.substring(0, 100) + '...'}"></span>
                            <span th:if="${section.description == null or section.description.length() <= 100}"
                                  th:text="${section.description} ?: '—'"></span>
                        </td>
                        <td th:text="${section.materialCount}"></td>
                        <td class="sort-order-cell" th:text="${section.sortOrder}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(allSections)}">
                        <td colspan="6" class="text-center text-muted">Разделы ещё не созданы</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>

<script>
    initTableFilter('sectionsTable', {
        searchPlaceholder: 'Поиск по названию, описанию...',
        filters: [],
        perPage: 20
    });
</script>
<script>
    (function () {
        var tbody = document.getElementById('sectionsBody');
        if (!tbody || tbody.rows.length === 0) return;

        var dragRow = null;

        tbody.addEventListener('dragstart', function (e) {
            var tr = e.target.closest('tr');
            if (!tr || !tr.dataset.id) return;
            dragRow = tr;
            tr.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', tr.dataset.id);
        });

        tbody.addEventListener('dragover', function (e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            var tr = e.target.closest('tr');
            if (!tr || tr === dragRow || !tr.dataset.id) return;
            var rows = Array.from(tbody.querySelectorAll('tr[data-id]'));
            rows.forEach(function (r) { r.classList.remove('drag-over'); });
            tr.classList.add('drag-over');
        });

        tbody.addEventListener('dragleave', function (e) {
            var tr = e.target.closest('tr');
            if (tr) tr.classList.remove('drag-over');
        });

        tbody.addEventListener('drop', function (e) {
            e.preventDefault();
            var targetTr = e.target.closest('tr');
            if (!targetTr || !dragRow || targetTr === dragRow || !targetTr.dataset.id) return;
            var rows = Array.from(tbody.querySelectorAll('tr[data-id]'));
            rows.forEach(function (r) { r.classList.remove('drag-over'); });

            var rect = targetTr.getBoundingClientRect();
            var midY = rect.top + rect.height / 2;
            if (e.clientY < midY) {
                tbody.insertBefore(dragRow, targetTr);
            } else {
                tbody.insertBefore(dragRow, targetTr.nextSibling);
            }

            updateNumbersAndSave();
        });

        tbody.addEventListener('dragend', function () {
            if (dragRow) dragRow.classList.remove('dragging');
            var rows = Array.from(tbody.querySelectorAll('tr[data-id]'));
            rows.forEach(function (r) { r.classList.remove('drag-over'); });
            dragRow = null;
        });

        function updateNumbersAndSave() {
            var rows = Array.from(tbody.querySelectorAll('tr[data-id]'));
            var orderedIds = [];
            rows.forEach(function (r, i) {
                r.querySelector('.row-number').textContent = i + 1;
                r.querySelector('.sort-order-cell').textContent = i + 1;
                orderedIds.push(parseInt(r.dataset.id));
            });

            fetch('/employee/chief/materials/reorderSections', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderedIds)
            }).then(function (r) { return r.json(); })
              .then(function (data) {
                  if (!data.success) location.reload();
              }).catch(function () { location.reload(); });
        }
    })();
</script>
</body>
</html>
