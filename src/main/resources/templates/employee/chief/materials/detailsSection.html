<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Раздел теории | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="row justify-content-center">
                <div class="col-12 col-lg-10">
                    <div class="profile-card p-4 mb-4">

                        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                        <h1 class="page-title" th:text="${sectionDTO.title}"></h1>
                        <p class="page-subtitle" th:if="${sectionDTO.description}" th:text="${sectionDTO.description}"></p>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="text-muted small">Порядок сортировки</div>
                                <div th:text="${sectionDTO.sortOrder}"></div>
                            </div>
                            <div class="col-md-6">
                                <div class="text-muted small">Количество материалов</div>
                                <div th:text="${sectionDTO.materialCount}"></div>
                            </div>
                        </div>

                        <div class="profile-actions">
                            <a th:href="@{/employee/chief/materials/editSection/{id}(id=${sectionDTO.id})}"
                               class="btn btn-primary btn-profile">
                                <i class="bi bi-pencil"></i> Редактировать
                            </a>
                            <a th:href="@{/employee/chief/materials/deleteSection/{id}(id=${sectionDTO.id})}"
                               class="btn btn-danger btn-profile"
                               onclick="return confirmDelete()">
                                <i class="bi bi-trash"></i> Удалить раздел
                            </a>
                        </div>
                    </div>

                    <div class="profile-card p-4">
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                            <h5 class="mb-0">Материалы</h5>
                            <a th:href="@{/employee/chief/materials/addMaterial/{sectionId}(sectionId=${sectionDTO.id})}"
                               class="btn btn-success btn-sm">
                                <i class="bi bi-plus-lg"></i> Добавить материал
                            </a>
                        </div>

                        <table class="table table-modern">
                            <thead>
                            <tr>
                                <th style="width: 50px">#</th>
                                <th>Название</th>
                                <th style="width: 140px">Тип</th>
                                <th style="width: 100px">Порядок</th>
                                <th style="width: 160px">Действия</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="material, index : ${allMaterials}">
                                <td th:text="${index.index + 1}"></td>
                                <td th:text="${material.title}"></td>
                                <td th:text="${material.materialTypeDisplayName}"></td>
                                <td th:text="${material.sortOrder}"></td>
                                <td>
                                    <a th:href="@{/employee/chief/materials/editMaterial/{id}(id=${material.id})}"
                                       class="btn btn-sm btn-outline-primary" title="Редактировать">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/employee/chief/materials/deleteMaterial/{id}(id=${material.id})}"
                                       class="btn btn-sm btn-outline-danger" title="Удалить"
                                       onclick="return confirmDelete()">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(allMaterials)}">
                                <td colspan="5" class="text-center text-muted">Материалы ещё не добавлены</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="link-section mt-3">
                        <a th:href="@{/employee/chief/materials/allSections}">← К списку разделов</a>
                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
