<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Раздел теории | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="row justify-content-center">
                <div class="col-12 col-lg-10">
                    <div class="profile-card p-4 mb-4">

                        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                        <h1 class="page-title" th:text="${sectionDTO.title}"></h1>
                        <p class="page-subtitle" th:if="${sectionDTO.description}" th:text="${sectionDTO.description}"></p>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="text-muted small">Порядок сортировки</div>
                                <div th:text="${sectionDTO.sortOrder}"></div>
                            </div>
                            <div class="col-md-6">
                                <div class="text-muted small">Количество материалов</div>
                                <div th:text="${sectionDTO.materialCount}"></div>
                            </div>
                        </div>

                        <div class="profile-actions">
                            <a th:href="@{/employee/chief/materials/editSection/{id}(id=${sectionDTO.id})}"
                               class="btn btn-primary btn-profile">
                                <i class="bi bi-pencil"></i> Редактировать
                            </a>
                            <a th:href="@{/employee/chief/materials/deleteSection/{id}(id=${sectionDTO.id})}"
                               class="btn btn-danger btn-profile"
                               onclick="return confirmDelete()">
                                <i class="bi bi-trash"></i> Удалить раздел
                            </a>
                        </div>
                    </div>

                    <div class="profile-card p-4">
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                            <h5 class="mb-0">Материалы</h5>
                            <a th:href="@{/employee/chief/materials/addMaterial/{sectionId}(sectionId=${sectionDTO.id})}"
                               class="btn btn-success btn-sm">
                                <i class="bi bi-plus-lg"></i> Добавить материал
                            </a>
                        </div>

                        <table class="table table-modern" id="materialsTable" th:data-section-id="${sectionDTO.id}">
                            <thead>
                            <tr>
                                <th style="width: 30px"></th>
                                <th style="width: 50px">#</th>
                                <th>Название</th>
                                <th style="width: 140px">Тип</th>
                                <th style="width: 100px">Порядок</th>
                                <th style="width: 160px">Действия</th>
                            </tr>
                            </thead>
                            <tbody id="materialsBody">
                            <tr th:each="material, index : ${allMaterials}" th:data-id="${material.id}" draggable="true">
                                <td class="drag-handle"><i class="bi bi-grip-vertical"></i></td>
                                <td class="row-number" th:text="${index.index + 1}"></td>
                                <td th:text="${material.title}"></td>
                                <td th:text="${material.materialTypeDisplayName}"></td>
                                <td class="sort-order-cell" th:text="${material.sortOrder}"></td>
                                <td>
                                    <a th:href="@{/employee/chief/materials/editMaterial/{id}(id=${material.id})}"
                                       class="btn btn-sm btn-outline-primary" title="Редактировать">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/employee/chief/materials/deleteMaterial/{id}(id=${material.id})}"
                                       class="btn btn-sm btn-outline-danger" title="Удалить"
                                       onclick="return confirmDelete()">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(allMaterials)}">
                                <td colspan="6" class="text-center text-muted">Материалы ещё не добавлены</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="link-section mt-3">
                        <a th:href="@{/employee/chief/materials/allSections}">← К списку разделов</a>
                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>

<script>
    (function () {
        var tbody = document.getElementById('materialsBody');
        var table = document.getElementById('materialsTable');
        if (!tbody || tbody.rows.length === 0 || !table) return;
        var sectionId = table.dataset.sectionId;

        var dragRow = null;

        tbody.addEventListener('dragstart', function (e) {
            var tr = e.target.closest('tr');
            if (!tr || !tr.dataset.id) return;
            dragRow = tr;
            tr.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', tr.dataset.id);
        });

        tbody.addEventListener('dragover', function (e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            var tr = e.target.closest('tr');
            if (!tr || tr === dragRow || !tr.dataset.id) return;
            var rows = Array.from(tbody.querySelectorAll('tr[data-id]'));
            rows.forEach(function (r) { r.classList.remove('drag-over'); });
            tr.classList.add('drag-over');
        });

        tbody.addEventListener('dragleave', function (e) {
            var tr = e.target.closest('tr');
            if (tr) tr.classList.remove('drag-over');
        });

        tbody.addEventListener('drop', function (e) {
            e.preventDefault();
            var targetTr = e.target.closest('tr');
            if (!targetTr || !dragRow || targetTr === dragRow || !targetTr.dataset.id) return;
            var rows = Array.from(tbody.querySelectorAll('tr[data-id]'));
            rows.forEach(function (r) { r.classList.remove('drag-over'); });

            var rect = targetTr.getBoundingClientRect();
            var midY = rect.top + rect.height / 2;
            if (e.clientY < midY) {
                tbody.insertBefore(dragRow, targetTr);
            } else {
                tbody.insertBefore(dragRow, targetTr.nextSibling);
            }

            updateNumbersAndSave();
        });

        tbody.addEventListener('dragend', function () {
            if (dragRow) dragRow.classList.remove('dragging');
            var rows = Array.from(tbody.querySelectorAll('tr[data-id]'));
            rows.forEach(function (r) { r.classList.remove('drag-over'); });
            dragRow = null;
        });

        function updateNumbersAndSave() {
            var rows = Array.from(tbody.querySelectorAll('tr[data-id]'));
            var orderedIds = [];
            rows.forEach(function (r, i) {
                r.querySelector('.row-number').textContent = i + 1;
                r.querySelector('.sort-order-cell').textContent = i + 1;
                orderedIds.push(parseInt(r.dataset.id));
            });

            fetch('/employee/chief/materials/reorderMaterials/' + sectionId, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderedIds)
            }).then(function (r) { return r.json(); })
              .then(function (data) {
                  if (!data.success) location.reload();
              }).catch(function () { location.reload(); });
        }
    })();
</script>
</body>
</html>
