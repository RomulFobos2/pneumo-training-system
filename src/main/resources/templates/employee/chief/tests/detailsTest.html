<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Тест | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <!-- Заголовок теста -->
            <div class="profile-card p-4 mb-4">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h1 class="page-title" th:text="${testDTO.title}"></h1>
                        <p class="page-subtitle" th:if="${testDTO.description}" th:text="${testDTO.description}"></p>
                    </div>
                    <div>
                        <span th:if="${testDTO.isActive()}" class="badge bg-success">Активен</span>
                        <span th:if="${!testDTO.isActive()}" class="badge bg-secondary">Черновик</span>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-auto">
                        <small class="text-muted">Время:</small>
                        <span th:if="${testDTO.timeLimit > 0}" th:text="${testDTO.timeLimit + ' мин'}"></span>
                        <span th:if="${testDTO.timeLimit == 0}" class="text-muted">без ограничения</span>
                    </div>
                    <div class="col-auto">
                        <small class="text-muted">Проходной балл:</small>
                        <span th:text="${testDTO.passingScore + '%'}"></span>
                    </div>
                    <div class="col-auto">
                        <small class="text-muted">Экзамен:</small>
                        <span th:text="${testDTO.isExam() ? 'Да' : 'Нет'}"></span>
                    </div>
                    <div class="col-auto">
                        <small class="text-muted">Вопросов:</small>
                        <span th:text="${testDTO.questionCount}"></span>
                    </div>
                    <div class="col-auto" th:if="${testDTO.createdByFullName}">
                        <small class="text-muted">Автор:</small>
                        <span th:text="${testDTO.createdByFullName}"></span>
                    </div>
                </div>
                <div class="mt-3">
                    <a th:href="@{/employee/chief/tests/editTest/{id}(id=${testDTO.id})}"
                       class="btn btn-sm btn-outline-primary me-1">
                        <i class="bi bi-pencil"></i> Редактировать
                    </a>
                    <a th:href="@{/employee/chief/tests/activateTest/{id}(id=${testDTO.id})}"
                       class="btn btn-sm me-1"
                       th:classappend="${testDTO.isActive()} ? 'btn-outline-secondary' : 'btn-outline-success'">
                        <i class="bi" th:classappend="${testDTO.isActive()} ? 'bi-pause-circle' : 'bi-play-circle'"></i>
                        <span th:text="${testDTO.isActive()} ? 'Деактивировать' : 'Активировать'"></span>
                    </a>
                    <a th:href="@{/employee/chief/tests/deleteTest/{id}(id=${testDTO.id})}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirmDelete()">
                        <i class="bi bi-trash"></i> Удалить тест
                    </a>
                </div>
            </div>

            <!-- Список вопросов -->
            <div class="profile-card p-4 mb-4 d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Вопросы</h5>
                <a th:href="@{/employee/chief/tests/addQuestion/{id}(id=${testDTO.id})}"
                   class="btn btn-success btn-sm">
                    <i class="bi bi-plus-lg"></i> Добавить вопрос
                </a>
            </div>

            <div class="profile-card p-4">
                <table class="table table-modern" id="questionsTable">
                    <thead>
                    <tr>
                        <th style="width: 30px"></th>
                        <th style="width: 50px">#</th>
                        <th>Вопрос</th>
                        <th style="width: 150px">Тип</th>
                        <th style="width: 90px">Ответов</th>
                        <th style="width: 130px">Действия</th>
                    </tr>
                    </thead>
                    <tbody id="questionsBody">
                    <tr th:each="question, index : ${allQuestions}" draggable="true"
                        th:data-id="${question.id}">
                        <td class="drag-handle"><i class="bi bi-grip-vertical"></i></td>
                        <td class="row-number" th:text="${index.index + 1}"></td>
                        <td>
                            <span th:text="${#strings.length(question.questionText) > 80
                                ? #strings.substring(question.questionText, 0, 80) + '...'
                                : question.questionText}"></span>
                        </td>
                        <td>
                            <span class="badge bg-info text-dark" th:text="${question.questionTypeDisplayName}"></span>
                        </td>
                        <td th:text="${question.answerCount}"></td>
                        <td>
                            <a th:href="@{/employee/chief/tests/editQuestion/{id}(id=${question.id})}"
                               class="btn btn-sm btn-outline-primary" title="Редактировать">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/employee/chief/tests/deleteQuestion/{id}(id=${question.id})}"
                               class="btn btn-sm btn-outline-danger" title="Удалить"
                               onclick="return confirmDelete()">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(allQuestions)}">
                        <td colspan="6" class="text-center text-muted">Вопросы ещё не добавлены</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="link-section mt-3">
                <a href="/employee/chief/tests/allTests">← К списку тестов</a>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>

<script th:inline="javascript">
    var testId = [[${testDTO.id}]];
</script>
<script>
    (function () {
        var tbody = document.getElementById('questionsBody');
        if (!tbody) return;
        var dragSrcEl = null;

        function handleDragStart(e) {
            dragSrcEl = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', '');
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            var row = this.closest('tr');
            if (row && row !== dragSrcEl) {
                row.classList.add('drag-over');
            }
        }

        function handleDragLeave() {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            if (dragSrcEl !== this) {
                var allRows = Array.from(tbody.querySelectorAll('tr[draggable]'));
                var fromIndex = allRows.indexOf(dragSrcEl);
                var toIndex = allRows.indexOf(this);
                if (fromIndex < toIndex) {
                    tbody.insertBefore(dragSrcEl, this.nextSibling);
                } else {
                    tbody.insertBefore(dragSrcEl, this);
                }
                updateNumbersAndSave();
            }
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
            tbody.querySelectorAll('tr').forEach(function (r) {
                r.classList.remove('drag-over');
            });
        }

        function updateNumbersAndSave() {
            var rows = tbody.querySelectorAll('tr[draggable]');
            var orderedIds = [];
            rows.forEach(function (row, i) {
                row.querySelector('.row-number').textContent = i + 1;
                orderedIds.push(parseInt(row.getAttribute('data-id')));
            });
            fetch('/employee/chief/tests/reorderQuestions/' + testId, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderedIds)
            });
        }

        tbody.querySelectorAll('tr[draggable]').forEach(function (row) {
            row.addEventListener('dragstart', handleDragStart);
            row.addEventListener('dragover', handleDragOver);
            row.addEventListener('dragleave', handleDragLeave);
            row.addEventListener('drop', handleDrop);
            row.addEventListener('dragend', handleDragEnd);
        });
    })();
</script>
</body>
</html>
