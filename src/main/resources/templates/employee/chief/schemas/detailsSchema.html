<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Просмотр мнемосхемы | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h1 class="page-title mb-0" th:text="${schema.title}"></h1>
                    <div class="d-flex gap-2">
                        <a th:href="@{/employee/chief/schemas/editSchema/{id}(id=${schema.id})}"
                           class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil-square"></i> Редактор
                        </a>
                        <a href="/employee/chief/schemas/allSchemas" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-arrow-left"></i> К списку
                        </a>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <p class="mb-1"><strong>Описание:</strong></p>
                        <p class="text-muted" th:text="${schema.description ?: 'Не указано'}"></p>
                    </div>
                    <div class="col-md-3">
                        <p class="mb-1"><strong>Размер:</strong></p>
                        <p th:text="${schema.width + ' x ' + schema.height + ' px'}"></p>
                    </div>
                    <div class="col-md-3">
                        <p class="mb-1"><strong>Создатель:</strong></p>
                        <p th:text="${schema.createdByFullName}"></p>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-3">
                        <span class="badge bg-primary">Элементов: <span th:text="${schema.elementCount}"></span></span>
                        <span class="badge bg-info">Соединений: <span th:text="${schema.connectionCount}"></span></span>
                    </div>
                </div>
            </div>

            <!-- Readonly SVG preview -->
            <div class="profile-card p-3">
                <div id="schemaPreview" style="overflow: auto; border: 1px solid #dee2e6; border-radius: 8px; background: #f8f9fa;">
                    <svg id="previewSvg" xmlns="http://www.w3.org/2000/svg"
                         th:attr="width=${schema.width}, height=${schema.height}, viewBox='0 0 ' + ${schema.width} + ' ' + ${schema.height}">
                    </svg>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>

<script th:inline="javascript">
    var schemaId = [[${schema.id}]];
</script>
<script src="/js/schemaEditor.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof SchemaEditor !== 'undefined') {
            SchemaEditor.initPreview(schemaId, document.getElementById('previewSvg'));
        }
    });
</script>
</body>
</html>
