<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Результаты | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4 d-flex justify-content-between align-items-center">
                <h1 class="page-title mb-0">Результаты тестирования</h1>
                <a th:href="@{/employee/chief/results/journal}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-table"></i> Журнал
                </a>
            </div>

            <!-- Фильтры -->
            <div class="profile-card p-4 mb-3">
                <form method="get" th:action="@{/employee/chief/results/allResults}">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label">Сотрудник</label>
                            <select name="employeeId" class="form-select form-select-sm">
                                <option value="">Все сотрудники</option>
                                <option th:each="emp : ${allEmployees}"
                                        th:value="${emp.id}"
                                        th:text="${emp.fullName}"
                                        th:selected="${emp.id == selectedEmployeeId}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Тест</label>
                            <select name="testId" class="form-select form-select-sm">
                                <option value="">Все тесты</option>
                                <option th:each="test : ${allTests}"
                                        th:value="${test.id}"
                                        th:text="${test.title}"
                                        th:selected="${test.id == selectedTestId}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Дата с</label>
                            <input type="date" name="dateFrom" class="form-control form-control-sm"
                                   th:value="${dateFrom}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Дата по</label>
                            <input type="date" name="dateTo" class="form-control form-control-sm"
                                   th:value="${dateTo}">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary btn-sm me-1">
                                <i class="bi bi-funnel"></i> Фильтр
                            </button>
                            <a th:href="@{/employee/chief/results/allResults}" class="btn btn-outline-secondary btn-sm">
                                Сбросить
                            </a>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Таблица результатов -->
            <div class="profile-card p-4 mb-3">
                <div class="table-responsive">
                    <table class="table table-modern">
                        <thead>
                        <tr>
                            <th style="width: 40px">#</th>
                            <th>Сотрудник</th>
                            <th>Тест</th>
                            <th style="width: 80px">Тип</th>
                            <th style="width: 130px">Дата</th>
                            <th style="width: 90px">Баллы</th>
                            <th style="width: 70px">%</th>
                            <th style="width: 110px">Статус</th>
                            <th style="width: 110px">Результат</th>
                            <th style="width: 60px"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="s, index : ${sessions}">
                            <td class="row-number" th:text="${index.index + 1}"></td>
                            <td th:text="${s.employeeFullName}"></td>
                            <td th:text="${s.testTitle}"></td>
                            <td>
                                <span th:if="${s.testIsExam}" class="badge bg-warning text-dark">Экзамен</span>
                                <span th:if="${!s.testIsExam}" class="text-muted">Тест</span>
                            </td>
                            <td th:text="${#temporals.format(s.startedAt, 'dd.MM.yyyy HH:mm')}"></td>
                            <td th:text="${s.score + '/' + s.totalScore}"></td>
                            <td th:text="${#numbers.formatDecimal(s.scorePercent, 1, 1) + '%'}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${s.sessionStatusName == 'COMPLETED' ? 'bg-success' : 'bg-secondary'}"
                                      th:text="${s.sessionStatusDisplayName}"></span>
                            </td>
                            <td>
                                <span th:if="${s.isPassed}" class="badge bg-success">Пройден</span>
                                <span th:if="${!s.isPassed}" class="badge bg-danger">Не пройден</span>
                            </td>
                            <td>
                                <a th:href="@{/employee/chief/results/detailsResult/{id}(id=${s.id})}"
                                   class="btn btn-outline-primary btn-sm" title="Подробнее">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(sessions)}">
                            <td colspan="10" class="text-center text-muted">Результаты не найдены</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Экспорт -->
            <div class="profile-card p-4 mb-3">
                <h5 class="mb-3"><i class="bi bi-file-earmark-excel"></i> Экспорт</h5>
                <div class="row g-3 align-items-end">
                    <div class="col-md-6">
                        <form method="post" th:action="@{/employee/chief/results/exportExamProtocol}" class="d-flex align-items-end gap-2">
                            <div class="flex-grow-1">
                                <label class="form-label">Протокол экзамена</label>
                                <select name="testId" class="form-select form-select-sm" required>
                                    <option value="">Выберите тест</option>
                                    <option th:each="test : ${allTests}"
                                            th:if="${test.isExam()}"
                                            th:value="${test.id}"
                                            th:text="${test.title}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success btn-sm">
                                <i class="bi bi-download"></i> Экспорт
                            </button>
                        </form>
                    </div>
                    <div class="col-md-6">
                        <form method="post" th:action="@{/employee/chief/results/exportJournal}">
                            <label class="form-label">Электронный журнал</label>
                            <div>
                                <button type="submit" class="btn btn-success btn-sm">
                                    <i class="bi bi-download"></i> Экспорт журнала
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
