<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Журнал назначения теста | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card p-4 mb-4">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                    <div>
                        <h1 class="page-title mb-2" th:text="'Журнал назначения: ' + ${assignment.assignmentTitle}"></h1>
                        <div class="d-flex gap-2 flex-wrap">
                            <span class="badge bg-primary">Тест</span>
                            <span class="badge bg-primary">Дедлайн: <span th:text="${#temporals.format(assignment.deadline, 'dd.MM.yyyy')}"></span></span>
                            <span class="badge bg-secondary">Автор: <span th:text="${assignment.createdByFullName}"></span></span>
                            <span class="badge bg-info text-dark">Создано: <span th:text="${#temporals.format(assignment.createdAt, 'dd.MM.yyyy HH:mm')}"></span></span>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <form method="post" th:action="@{/employee/chief/results/exportJournal}">
                            <input type="hidden" name="assignmentId" th:value="${assignment.id}">
                            <button type="submit" class="btn btn-success btn-profile">
                                <i class="bi bi-file-earmark-excel"></i> Протокол
                            </button>
                        </form>
                        <form method="post" th:action="@{/employee/chief/results/exportDetailedJournal}">
                            <input type="hidden" name="assignmentId" th:value="${assignment.id}">
                            <button type="submit" class="btn btn-success btn-profile">
                                <i class="bi bi-file-earmark-excel"></i> Журнал
                            </button>
                        </form>
                        <a th:href="@{/employee/chief/results/allResults}" class="btn btn-outline-secondary btn-profile">
                            <i class="bi bi-arrow-left"></i> Назад
                        </a>
                    </div>
                </div>
            </div>

            <div class="profile-card p-4 mb-4">
                <div class="row g-3 text-center">
                    <div class="col-md-3">
                        <div class="fs-3 fw-bold text-primary" th:text="${assignment.totalAssigned}"></div>
                        <div class="text-muted small">Назначено</div>
                    </div>
                    <div class="col-md-3">
                        <div class="fs-3 fw-bold text-success" th:text="${assignment.completedCount}"></div>
                        <div class="text-muted small">Выполнено</div>
                    </div>
                    <div class="col-md-3">
                        <div class="fs-3 fw-bold text-danger" th:text="${assignment.failedCount}"></div>
                        <div class="text-muted small">Не сдано</div>
                    </div>
                    <div class="col-md-3">
                        <div class="fs-3 fw-bold text-warning" th:text="${assignment.overdueCount}"></div>
                        <div class="text-muted small">Просрочено</div>
                    </div>
                </div>
            </div>

            <div class="profile-card p-4 mb-4">
                <h5 class="mb-3">Сотрудники по назначению</h5>
                <div class="table-responsive">
                    <table class="table table-modern">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>ФИО</th>
                            <th>Статус назначения</th>
                            <th>Дата завершения</th>
                            <th>Баллы</th>
                            <th>Результат</th>
                            <th>Детали</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="ae, index : ${assignmentEmployees}">
                            <td th:text="${index.index + 1}"></td>
                            <td th:text="${ae.employeeFullName}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${ae.statusName == 'COMPLETED' ? 'bg-success' : (ae.statusName == 'FAILED' ? 'bg-danger' : (ae.statusName == 'OVERDUE' ? 'bg-warning text-dark' : 'bg-secondary'))}"
                                      th:text="${ae.statusDisplayName}"></span>
                            </td>
                            <td th:text="${ae.finishedAt != null ? #temporals.format(ae.finishedAt, 'dd.MM.yyyy HH:mm') : '—'}"></td>
                            <td th:text="${ae.score != null && ae.totalScore != null ? ae.score + '/' + ae.totalScore : '—'}"></td>
                            <td>
                                <span th:if="${ae.scorePercent != null}"
                                      class="badge"
                                      th:classappend="${ae.passed ? 'bg-success' : 'bg-danger'}"
                                      th:text="${#numbers.formatDecimal(ae.scorePercent, 1, 1) + '%'}"></span>
                                <span th:if="${ae.scorePercent == null}" class="text-muted">—</span>
                            </td>
                            <td>
                                <a th:if="${ae.completedSessionId != null}"
                                   th:href="@{/employee/chief/results/detailsResult/{id}(id=${ae.completedSessionId})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <span th:if="${ae.completedSessionId == null}" class="text-muted">—</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(assignmentEmployees)}">
                            <td colspan="7" class="text-center text-muted">Сотрудники не найдены</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
