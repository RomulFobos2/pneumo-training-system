<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Результаты симуляций | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
    <script src="/js/tablePagination.js"></script>
    <script src="/js/tableSort.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4">
                <h1 class="page-title mb-2">Результаты симуляций</h1>
                <p class="page-subtitle mb-0">Страница показывает результаты по конкретным назначениям мнемосхем. Для каждого назначения доступен свой журнал и Excel.</p>
            </div>

            <div class="profile-card p-4 mb-3">
                <form method="get" th:action="@{/employee/chief/results/allSimResults}">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label">Сотрудник</label>
                            <select name="employeeId" class="form-select form-select-sm">
                                <option value="">Все сотрудники</option>
                                <option th:each="emp : ${allEmployees}"
                                        th:value="${emp.id}"
                                        th:text="${emp.fullName}"
                                        th:selected="${emp.id == selectedEmployeeId}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Сценарий</label>
                            <select name="scenarioId" class="form-select form-select-sm">
                                <option value="">Все сценарии</option>
                                <option th:each="sc : ${allScenarios}"
                                        th:value="${sc.id}"
                                        th:text="${sc.title}"
                                        th:selected="${sc.id == selectedScenarioId}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Создано с</label>
                            <input type="date" name="dateFrom" class="form-control form-control-sm" th:value="${dateFrom}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Создано по</label>
                            <input type="date" name="dateTo" class="form-control form-control-sm" th:value="${dateTo}">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary btn-sm w-100">
                                <i class="bi bi-funnel"></i> Фильтр
                            </button>
                            <a th:href="@{/employee/chief/results/allSimResults}" class="btn btn-outline-secondary btn-sm w-100 mt-1">Сбросить</a>
                        </div>
                    </div>
                </form>
            </div>

            <div class="profile-card p-4 mb-3">
                <div class="table-responsive">
                    <table id="simResultsTable" class="table table-modern">
                        <thead>
                        <tr>
                            <th style="width: 50px">#</th>
                            <th data-sortable data-sort-type="text">Назначение</th>
                            <th style="width: 130px" data-sortable data-sort-type="date">Создано</th>
                            <th style="width: 120px" data-sortable data-sort-type="date">Дедлайн</th>
                            <th style="width: 100px">Назначено</th>
                            <th style="width: 100px">Выполнено</th>
                            <th style="width: 100px">Не выполнено</th>
                            <th style="width: 100px">Просрочено</th>
                            <th style="width: 120px">Журнал</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="a, index : ${simAssignments}">
                            <td class="row-number" th:text="${index.index + 1}"></td>
                            <td>
                                <div class="fw-semibold" th:text="${a.assignmentTitle}"></div>
                                <div class="small text-muted" th:text="'Автор: ' + ${a.createdByFullName}"></div>
                            </td>
                            <td th:text="${#temporals.format(a.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
                            <td th:text="${#temporals.format(a.deadline, 'dd.MM.yyyy')}"></td>
                            <td th:text="${a.totalAssigned}"></td>
                            <td><span class="badge bg-success" th:text="${a.completedCount}"></span></td>
                            <td><span class="badge bg-danger" th:text="${a.failedCount}"></span></td>
                            <td><span class="badge bg-warning text-dark" th:text="${a.overdueCount}"></span></td>
                            <td>
                                <a th:href="@{/employee/chief/results/simAssignmentJournal/{id}(id=${a.id})}"
                                   class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-table"></i> Журнал
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(simAssignments)}">
                            <td colspan="9" class="text-center text-muted">Назначения не найдены</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
<script>
    initPagination('simResultsTable', { perPage: 20 });
    initSortable('simResultsTable');
</script>
</body>
</html>
