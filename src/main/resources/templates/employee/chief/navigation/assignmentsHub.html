<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Назначения | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">
            <div class="profile-card mb-4">
                <h1 class="page-title mb-2">Назначения</h1>
                <p class="page-subtitle mb-0">Выберите раздел для работы с назначениями тестов и мнемосхемы.</p>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <a th:href="@{/employee/chief/assignments/allAssignments}" class="profile-card section-nav-card">
                        <div class="feature-icon"><i class="bi bi-clipboard-check"></i></div>
                        <h5>Назначения тестов</h5>
                        <p class="text-muted mb-0">Создание, просмотр и удаление назначений для тестирования сотрудников.</p>
                    </a>
                </div>
                <div class="col-md-6">
                    <a th:href="@{/employee/chief/simAssignments/allAssignments}" class="profile-card section-nav-card">
                        <div class="feature-icon"><i class="bi bi-clipboard2-pulse"></i></div>
                        <h5>Назначения мнемосхемы</h5>
                        <p class="text-muted mb-0">Назначение сценариев мнемосхемы и контроль выполнения по сотрудникам.</p>
                    </a>
                </div>
            </div>
        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
