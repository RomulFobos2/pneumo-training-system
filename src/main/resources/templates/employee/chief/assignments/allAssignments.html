<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Назначения | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <h1 class="page-title mb-0">Назначения</h1>
                    <div class="profile-actions">
                        <a th:href="@{/employee/chief/assignments/addAssignment}" class="btn btn-success btn-profile">
                            <i class="bi bi-plus-lg"></i> Новое назначение
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="table-container">
                <table class="table table-modern">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Тип</th>
                        <th>Название</th>
                        <th>Дедлайн</th>
                        <th>Назначено</th>
                        <th>Выполнено</th>
                        <th>Просрочено</th>
                        <th>Автор</th>
                        <th style="width: 120px">Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a, index : ${allAssignments}">
                        <td th:text="${index.index + 1}"></td>
                        <td>
                            <span class="badge" th:classappend="${a.scenarioId != null ? 'bg-info' : 'bg-primary'}"
                                  th:text="${a.assignmentType}"></span>
                        </td>
                        <td th:text="${a.assignmentTitle}"></td>
                        <td>
                            <span th:text="${#temporals.format(a.deadline, 'dd.MM.yyyy')}"></span>
                        </td>
                        <td><span class="badge bg-primary" th:text="${a.totalAssigned}"></span></td>
                        <td><span class="badge bg-success" th:text="${a.completedCount}"></span></td>
                        <td>
                            <span th:if="${a.overdueCount > 0}" class="badge bg-danger" th:text="${a.overdueCount}"></span>
                            <span th:if="${a.overdueCount == 0}" class="badge bg-secondary">0</span>
                        </td>
                        <td th:text="${a.createdByFullName}"></td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/employee/chief/assignments/detailsAssignment/{id}(id=${a.id})}"
                                   class="btn btn-sm btn-outline-primary" title="Подробнее">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a href="javascript:void(0)"
                                   th:onclick="'confirmDelete(\'/employee/chief/assignments/deleteAssignment/' + ${a.id} + '\')'"
                                   class="btn btn-sm btn-outline-danger" title="Удалить">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(allAssignments)}">
                        <td colspan="9" class="text-center text-muted">Нет назначений</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
