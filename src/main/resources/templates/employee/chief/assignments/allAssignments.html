<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Назначения | АОС ПИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
    <script src="/js/tablePagination.js"></script>
    <script src="/js/tableSort.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <h1 class="page-title mb-0">Назначения</h1>
                    <div class="profile-actions">
                        <a th:href="@{/employee/chief/assignments/addAssignment}" class="btn btn-success btn-profile">
                            <i class="bi bi-plus-lg"></i> Новое назначение
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="profile-card p-4 mb-3">
                <form method="get" th:action="@{/employee/chief/assignments/allAssignments}">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label">Поиск</label>
                            <input type="text" name="q" class="form-control form-control-sm"
                                   placeholder="Тест или автор" th:value="${q}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Статус</label>
                            <select name="status" class="form-select form-select-sm">
                                <option value="ALL" th:selected="${status == null or status == 'ALL'}">Все</option>
                                <option value="PENDING" th:selected="${status == 'PENDING'}">Ожидает</option>
                                <option value="FAILED" th:selected="${status == 'FAILED'}">Не сдан</option>
                                <option value="OVERDUE" th:selected="${status == 'OVERDUE'}">Просрочен</option>
                                <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">Выполнен</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Дедлайн с</label>
                            <input type="date" name="deadlineFrom" class="form-control form-control-sm" th:value="${deadlineFrom}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Дедлайн по</label>
                            <input type="date" name="deadlineTo" class="form-control form-control-sm" th:value="${deadlineTo}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Создано с</label>
                            <input type="date" name="createdFrom" class="form-control form-control-sm" th:value="${createdFrom}">
                        </div>
                        <div class="col-md-1">
                            <label class="form-label">Создано по</label>
                            <input type="date" name="createdTo" class="form-control form-control-sm" th:value="${createdTo}">
                        </div>
                        <div class="col-12 d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <input type="hidden" name="hideCompleted" value="false">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="hideCompleted" name="hideCompleted" value="true"
                                       th:checked="${hideCompleted}">
                                <label class="form-check-label" for="hideCompleted">Скрыть полностью выполненные</label>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="bi bi-funnel"></i> Применить
                                </button>
                                <a th:href="@{/employee/chief/assignments/allAssignments}" class="btn btn-outline-secondary btn-sm">
                                    Сбросить
                                </a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table id="assignmentsTable" class="table table-modern">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th data-sortable data-sort-type="text">Название теста</th>
                        <th data-sortable data-sort-type="date">Дедлайн</th>
                        <th data-sortable data-sort-type="date">Создано</th>
                        <th data-sortable data-sort-type="number">Назначено</th>
                        <th data-sortable data-sort-type="number">Выполнено</th>
                        <th data-sortable data-sort-type="number">Не сдано</th>
                        <th data-sortable data-sort-type="number">Просрочено</th>
                        <th data-sortable data-sort-type="text">Автор</th>
                        <th style="width: 120px">Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a, index : ${allAssignments}">
                        <td class="row-number" th:text="${index.index + 1}"></td>
                        <td th:text="${a.assignmentTitle}"></td>
                        <td th:text="${#temporals.format(a.deadline, 'dd.MM.yyyy')}"></td>
                        <td th:text="${#temporals.format(a.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
                        <td><span class="badge bg-primary" th:text="${a.totalAssigned}"></span></td>
                        <td><span class="badge bg-success" th:text="${a.completedCount}"></span></td>
                        <td>
                            <span th:if="${a.failedCount > 0}" class="badge bg-danger" th:text="${a.failedCount}"></span>
                            <span th:if="${a.failedCount == 0}" class="badge bg-secondary">0</span>
                        </td>
                        <td>
                            <span th:if="${a.overdueCount > 0}" class="badge bg-danger" th:text="${a.overdueCount}"></span>
                            <span th:if="${a.overdueCount == 0}" class="badge bg-secondary">0</span>
                        </td>
                        <td th:text="${a.createdByFullName}"></td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/employee/chief/assignments/detailsAssignment/{id}(id=${a.id})}"
                                   class="btn btn-sm btn-outline-primary" title="Подробнее">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a href="javascript:void(0)"
                                   th:onclick="'confirmDelete(\'/employee/chief/assignments/deleteAssignment/' + ${a.id} + '\')'"
                                   class="btn btn-sm btn-outline-danger" title="Удалить">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(allAssignments)}">
                        <td colspan="10" class="text-center text-muted">Нет назначений</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
<script>
    initPagination('assignmentsTable', { perPage: 20 });
    initSortable('assignmentsTable');
</script>
</body>
</html>
